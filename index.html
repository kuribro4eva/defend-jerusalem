<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defend Jerusalem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #e8e0d0;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  /* ── 16:9 GAME CONTAINER ── */
  #game {
    aspect-ratio: 16 / 9;
    max-width: 100vw;
    max-height: 100vh;
    width: 100vw;
    position: relative;
    overflow: hidden;
    background: #0a0a1a;
  }

  #fullscreen-btn {
    position: absolute;
    top: 2%;
    right: 2%;
    z-index: 200;
    background: rgba(40, 35, 25, 0.7);
    border: 1px solid #5a5040;
    color: #a09080;
    padding: 6px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  #fullscreen-btn:hover { background: rgba(60, 50, 35, 0.9); }

  /* ── SCENE ── */
  #scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ── SKY ── */
  #sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 40%, #2a1a1a 70%, #0a0a1a 100%);
    transition: background 3s ease;
    z-index: 0;
  }
  #sky.dawn {
    background: linear-gradient(180deg, #1a2a4e 0%, #3a4a6e 30%, #d4a060 70%, #f0c070 100%);
  }

  /* ── STARS ── */
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
    z-index: 1;
  }
  @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

  /* ── GROUND ── */
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30%;
    background: linear-gradient(180deg, #2a1f15 0%, #1a1410 100%);
    z-index: 5;
  }

  /* ── CITY ── */
  #city-container {
    position: absolute;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%) scale(var(--city-scale, 1));
    transform-origin: bottom center;
    z-index: 10;
    transition: filter 1s ease, box-shadow 1s ease;
  }
  #city-container.destroyed { filter: brightness(0.2) grayscale(1); }
  #city-container.restored {
    filter: brightness(1.1) saturate(1.2);
  }

  .building {
    position: absolute;
    bottom: 0;
    background: #3a3020;
    border: 1px solid #4a4030;
    transition: all 0.6s ease;
  }
  .building.damaged {
    transform: scaleY(0.7) skewX(-3deg);
    opacity: 0.6;
    filter: brightness(0.5);
  }
  .building.fallen {
    transform: scaleY(0.12) scaleX(1.4);
    opacity: 0.4;
    border-radius: 2px;
  }
  .building.restored {
    background: #5a4a30;
    border-color: #8a7a50;
    box-shadow: 0 0 12px rgba(200, 170, 100, 0.15);
  }

  /* Wall */
  #wall {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 720px;
    height: 80px;
    background: #4a3a25;
    border-top: 3px solid #5a4a35;
    z-index: 8;
    transition: all 0.6s ease;
  }
  #wall .merlon {
    position: absolute;
    top: -18px;
    width: 24px;
    height: 18px;
    background: #4a3a25;
    border: 1px solid #5a4a35;
  }
  #wall.fallen {
    opacity: 0.2;
    transform: translateX(-50%) scaleY(0.12) scaleX(1.2);
  }
  #wall.restored {
    opacity: 1;
    transform: translateX(-50%) scaleY(1);
    background: #5a4a30;
    border-top-color: #8a7a50;
    box-shadow: 0 0 15px rgba(200, 170, 100, 0.1);
  }

  /* Gate */
  #gate {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 46px;
    background: #1a1410;
    border-radius: 26px 26px 0 0;
    border: 2px solid #5a4a35;
    border-bottom: none;
    z-index: 9;
  }

  /* Towers */
  .tower {
    position: absolute;
    bottom: 0;
    width: 46px;
    background: #4a3a25;
    border: 1px solid #5a4a35;
    z-index: 9;
    transition: all 0.6s ease;
  }
  .tower-cap {
    position: absolute;
    top: -12px;
    left: -5px;
    width: 56px;
    height: 14px;
    background: #5a4a35;
    border-radius: 2px;
  }
  .tower.fallen {
    transform: scaleY(0.15) rotate(8deg);
    opacity: 0.3;
  }
  .tower.restored {
    transform: rotate(0deg);
    opacity: 1;
    background: #5a4a30;
    box-shadow: 0 0 12px rgba(200, 170, 100, 0.1);
  }

  /* ── HEALTH BAR ── */
  #health-bar-container {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    width: 35%;
    z-index: 50;
    text-align: center;
    transition: opacity 1s ease;
  }
  #health-label {
    font-family: 'Cinzel', serif;
    font-size: clamp(13px, 1.4vw, 22px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #a09080;
    margin-bottom: 5px;
  }
  #health-bar-bg {
    width: 100%;
    height: 14px;
    background: #1a1a1a;
    border-radius: 7px;
    border: 1px solid #3a3a3a;
    overflow: hidden;
  }
  #health-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #c0392b, #e67e22, #27ae60);
    border-radius: 7px;
    transition: width 1s ease;
  }
  #health-bar.low { background: linear-gradient(90deg, #c0392b, #e74c3c); }
  #health-bar.gold { background: linear-gradient(90deg, #c8a84e, #e8c85e, #c8a84e); }
  #wave-counter {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.2vw, 18px);
    letter-spacing: 2px;
    color: #8a7a60;
    margin-top: 6px;
    min-height: 1.2em;
  }

  /* ── WAVE COLOR THEMES ── */
  .wave-theme-0 { --wave-color: #4a90d9; --wave-glow: rgba(74, 144, 217, 0.4); }
  .wave-theme-1 { --wave-color: #2ecc71; --wave-glow: rgba(46, 204, 113, 0.4); }
  .wave-theme-2 { --wave-color: #e67e22; --wave-glow: rgba(230, 126, 34, 0.4); }
  .wave-theme-3 { --wave-color: #9b59b6; --wave-glow: rgba(155, 89, 182, 0.4); }

  #attack-panel.wave-theme-0 #wave-title { color: #4a90d9; text-shadow: 0 0 25px rgba(74, 144, 217, 0.4); }
  #attack-panel.wave-theme-1 #wave-title { color: #2ecc71; text-shadow: 0 0 25px rgba(46, 204, 113, 0.4); }
  #attack-panel.wave-theme-2 #wave-title { color: #e67e22; text-shadow: 0 0 25px rgba(230, 126, 34, 0.4); }
  #attack-panel.wave-theme-3 #wave-title { color: #9b59b6; text-shadow: 0 0 25px rgba(155, 89, 182, 0.4); }

  #attack-panel.wave-theme-0 .choice-btn:hover { border-color: #4a90d9; background: rgba(30, 60, 120, 0.6); }
  #attack-panel.wave-theme-1 .choice-btn:hover { border-color: #2ecc71; background: rgba(20, 80, 40, 0.6); }
  #attack-panel.wave-theme-2 .choice-btn:hover { border-color: #e67e22; background: rgba(100, 50, 10, 0.6); }
  #attack-panel.wave-theme-3 .choice-btn:hover { border-color: #9b59b6; background: rgba(70, 30, 90, 0.6); }

  /* ── DEFENSE ANIMATIONS ── */
  @keyframes defense-walls {
    0% { box-shadow: none; filter: brightness(1); }
    25% { box-shadow: 0 0 30px rgba(74, 144, 217, 0.5); }
    50% { box-shadow: 0 0 60px rgba(74, 144, 217, 0.8), inset 0 0 25px rgba(74, 144, 217, 0.3); filter: brightness(1.3); }
    75% { box-shadow: 0 0 40px rgba(74, 144, 217, 0.4); }
    100% { box-shadow: none; filter: brightness(1); }
  }
  #city-container.defense-walls #wall { animation: defense-walls 1.2s ease-in-out; }
  #city-container.defense-walls .tower { animation: defense-walls 1.2s ease-in-out 0.1s; }

  @keyframes defense-supplies {
    0% { filter: brightness(1); box-shadow: none; }
    30% { filter: brightness(1.2); box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
    60% { filter: brightness(1.6) sepia(0.2); box-shadow: 0 0 30px rgba(46, 204, 113, 0.6); }
    100% { filter: brightness(1); box-shadow: none; }
  }
  @keyframes defense-supplies-city {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 50px rgba(46, 204, 113, 0.4), 0 0 80px rgba(46, 204, 113, 0.15); }
  }
  #city-container.defense-supplies .building { animation: defense-supplies 1.2s ease-in-out; }
  #city-container.defense-supplies { animation: defense-supplies-city 1.2s ease-in-out; }

  @keyframes defense-unity {
    0% { box-shadow: none; }
    20% { box-shadow: 0 0 30px rgba(230, 126, 34, 0.3); }
    50% { box-shadow: 0 0 70px rgba(230, 126, 34, 0.6), 0 0 120px rgba(255, 160, 50, 0.25); }
    80% { box-shadow: 0 0 40px rgba(230, 126, 34, 0.3); }
    100% { box-shadow: none; }
  }
  @keyframes defense-unity-pulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4) saturate(1.3); }
  }
  #city-container.defense-unity { animation: defense-unity 1.2s ease-in-out; }
  #city-container.defense-unity .building { animation: defense-unity-pulse 0.6s ease-in-out 2; }

  @keyframes defense-combat {
    0% { box-shadow: none; }
    20% { box-shadow: 0 0 25px rgba(155, 89, 182, 0.4); }
    40% { box-shadow: 0 0 50px rgba(155, 89, 182, 0.7), 0 0 80px rgba(120, 60, 180, 0.3); }
    60% { box-shadow: 0 0 65px rgba(155, 89, 182, 0.9), 0 0 100px rgba(120, 60, 180, 0.4); }
    100% { box-shadow: none; }
  }
  @keyframes defense-combat-sparkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  #city-container.defense-combat { animation: defense-combat 1.2s ease-in-out; }

  /* ── AURA (Phase 2) ── */
  @keyframes aura-pulse {
    0%, 100% { box-shadow: 0 0 25px rgba(200, 170, 100, 0.2), 0 0 50px rgba(200, 170, 100, 0.1); }
    50% { box-shadow: 0 0 40px rgba(200, 170, 100, 0.45), 0 0 70px rgba(200, 170, 100, 0.2); }
  }
  #city-container.aura-1 { animation: aura-pulse 3s ease-in-out infinite; }
  #city-container.aura-2 {
    animation: aura-pulse 3s ease-in-out infinite;
    filter: brightness(1.15) saturate(1.3);
  }
  #city-container.aura-3 {
    animation: aura-pulse 2.5s ease-in-out infinite;
    filter: brightness(1.2) saturate(1.4);
  }
  @keyframes aura-flash {
    0% { box-shadow: 0 0 60px rgba(200, 170, 100, 0.8), 0 0 100px rgba(200, 170, 100, 0.4); }
    100% { box-shadow: 0 0 25px rgba(200, 170, 100, 0.3), 0 0 50px rgba(200, 170, 100, 0.15); }
  }
  #city-container.aura-flash { animation: aura-flash 0.8s ease-out; }

  /* ── ATTACK EFFECTS ── */
  .arrow {
    position: absolute;
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, #f4a460, #8B4513);
    z-index: 20;
  }
  .arrow::after {
    content: '';
    position: absolute;
    right: -6px;
    top: -4px;
    border-left: 10px solid #666;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  .fire {
    position: absolute;
    width: 22px;
    height: 34px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    z-index: 25;
    animation: flicker 0.3s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    0% { transform: scale(1) rotate(-2deg); opacity: 0.8; }
    100% { transform: scale(1.15) rotate(2deg); opacity: 1; }
  }

  .smoke {
    position: absolute;
    width: 40px;
    height: 40px;
    background: radial-gradient(circle, rgba(80,80,80,0.4), transparent);
    border-radius: 50%;
    z-index: 24;
    animation: rise 3s ease-out forwards;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-100px) scale(2.5); opacity: 0; }
  }

  @keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-8px, -5px); }
    20% { transform: translate(7px, 4px); }
    30% { transform: translate(-6px, 6px); }
    40% { transform: translate(5px, -4px); }
    50% { transform: translate(-4px, 3px); }
    60% { transform: translate(6px, -6px); }
    70% { transform: translate(-3px, 5px); }
    80% { transform: translate(4px, -3px); }
    90% { transform: translate(-5px, 2px); }
  }
  #scene.shaking { animation: shake 0.6s ease-in-out; }

  /* ── WATER (Phase 2) ── */
  #water {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0;
    background: linear-gradient(180deg, rgba(70, 130, 180, 0.25), rgba(70, 130, 180, 0.08));
    z-index: 6;
    transition: height 3s ease;
  }
  #water.flowing { height: 5%; }

  /* ── UI PANELS ── */
  #ui-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .panel {
    pointer-events: auto;
    text-align: center;
    display: none;
  }
  .panel.active { display: block; }

  /* Title screen */
  #title-panel h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(36px, 5vw, 72px);
    font-weight: 900;
    color: #d4a860;
    text-shadow: 0 2px 20px rgba(200, 160, 80, 0.3);
    margin-bottom: 10px;
  }
  #title-panel p {
    font-size: clamp(14px, 1.6vw, 24px);
    color: #a09080;
    margin-bottom: 32px;
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: clamp(12px, 1.2vw, 20px) clamp(32px, 3vw, 56px);
    font-family: 'Cinzel', serif;
    font-size: clamp(17px, 1.8vw, 28px);
    font-weight: 700;
    border: 2px solid #8a7a50;
    background: rgba(60, 50, 30, 0.8);
    color: #d4a860;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: rgba(100, 80, 40, 0.8);
    box-shadow: 0 0 20px rgba(200, 160, 80, 0.2);
    transform: translateY(-2px);
  }

  /* Attack panel */
  #attack-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
  }
  #wave-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 3.5vw, 52px);
    font-weight: 700;
    color: #c0392b;
    text-shadow: 0 0 25px rgba(192, 57, 43, 0.4);
    margin-bottom: 0.5em;
  }
  #wave-subtitle {
    font-size: clamp(15px, 1.8vw, 24px);
    color: #a09080;
    margin-bottom: 1.2em;
  }
  #choices {
    display: flex;
    gap: clamp(12px, 1.5vw, 24px);
    justify-content: center;
    flex-wrap: wrap;
  }
  .choice-btn {
    padding: clamp(12px, 1.2vw, 20px) clamp(24px, 2.5vw, 44px);
    font-family: 'Inter', sans-serif;
    font-size: clamp(15px, 1.6vw, 24px);
    font-weight: 600;
    border: 1px solid #5a5040;
    background: rgba(40, 35, 25, 0.9);
    color: #d4c4a0;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    min-width: clamp(150px, 14vw, 240px);
  }
  .choice-btn:hover {
    border-color: #c0392b;
    background: rgba(80, 30, 20, 0.6);
    color: #f0d0a0;
    transform: translateY(-2px);
  }
  .choice-btn:active { transform: translateY(0); }

  /* Result text */
  #result-text {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 2.2vw, 32px);
    color: #c0392b;
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 101;
    text-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
    pointer-events: none;
    max-width: 550px;
    line-height: 1.5;
  }
  #result-text.visible { opacity: 1; }

  /* Bridge panel */
  #bridge-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 600px;
    width: 85%;
  }
  #bridge-line1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 2.8vw, 42px);
    font-weight: 700;
    color: #8a4040;
    text-shadow: 0 0 20px rgba(138, 64, 64, 0.3);
    margin-bottom: 20px;
    line-height: 1.4;
  }
  #bridge-line2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 2.6vw, 38px);
    font-weight: 700;
    color: #d4a860;
    text-shadow: 0 0 20px rgba(200, 160, 80, 0.3);
    margin-bottom: 36px;
    line-height: 1.4;
  }

  /* Fallen panel */
  #fallen-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  #fallen-panel h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(30px, 4vw, 56px);
    font-weight: 900;
    color: #8a2020;
    text-shadow: 0 0 40px rgba(138, 32, 32, 0.5);
  }

  /* Verse panel */
  #verse-panel {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    max-width: 65%;
    width: 85%;
    text-align: center;
    background: rgba(10, 10, 26, 0.7);
    padding: 24px 32px 20px;
    border-radius: 8px;
    z-index: 110;
    pointer-events: none;
  }
  #verse-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 2.8vw, 40px);
    font-weight: 700;
    color: #d4a860;
    line-height: 1.4;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(15px);
    transition: all 1.2s ease;
  }
  #verse-text.visible { opacity: 1; transform: translateY(0); }
  #verse-ref {
    font-family: 'Inter', sans-serif;
    font-size: clamp(12px, 1.4vw, 20px);
    color: #8a7a60;
    opacity: 0;
    transition: opacity 1.2s ease 0.3s;
  }
  #verse-ref.visible { opacity: 1; }

  /* Main truth */
  #main-truth {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 2.6vw, 38px);
    font-weight: 700;
    color: #e8c85e;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(15px);
    transition: all 1.5s ease;
    margin-top: 12px;
    padding-top: 16px;
    border-top: 1px solid rgba(200, 160, 80, 0.3);
  }
  #main-truth.visible { opacity: 1; transform: translateY(0); }

  /* Dark overlay */
  #dark-overlay {
    position: absolute;
    inset: 0;
    background: #0a0a1a;
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
  }
  #dark-overlay.active { opacity: 0.85; pointer-events: auto; }
  #dark-overlay.clearing { opacity: 0; }
</style>
</head>
<body>

<div id="game">
  <button id="fullscreen-btn">Fullscreen</button>

  <div id="scene">
    <div id="sky"></div>
    <div id="dark-overlay"></div>
    <div id="stars"></div>

    <!-- City -->
    <div id="city-container">
      <div id="wall"><div id="gate"></div></div>
      <div class="tower" id="tower-left" style="left: -38px; height: 160px;"><div class="tower-cap"></div></div>
      <div class="tower" id="tower-right" style="right: -38px; height: 160px;"><div class="tower-cap"></div></div>
      <div class="building" style="left: 20px; width: 70px; height: 150px;"></div>
      <div class="building" style="left: 105px; width: 60px; height: 210px;"></div>
      <div class="building" style="left: 185px; width: 75px; height: 170px;"></div>
      <div class="building" style="left: 280px; width: 70px; height: 240px;"></div>
      <div class="building" style="left: 370px; width: 70px; height: 160px;"></div>
      <div class="building" style="left: 455px; width: 65px; height: 200px;"></div>
      <div class="building" style="left: 540px; width: 60px; height: 140px;"></div>
      <div class="building" style="left: 610px; width: 50px; height: 170px;"></div>
    </div>

    <div id="water"></div>
    <div id="ground"></div>

    <!-- Health bar -->
    <div id="health-bar-container">
      <div id="health-label">Castle Defense</div>
      <div id="health-bar-bg"><div id="health-bar"></div></div>
      <div id="wave-counter"></div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
      <!-- Title -->
      <div class="panel active" id="title-panel">
        <h1>Castle Defense</h1>
        <p>Can you protect the castle?</p>
        <button class="btn" id="start-btn">Begin</button>
      </div>

      <!-- Attack wave -->
      <div class="panel" id="attack-panel">
        <div id="wave-title"></div>
        <div id="wave-subtitle"></div>
        <div id="choices"></div>
      </div>

      <!-- Result text -->
      <div id="result-text"></div>

      <!-- Castle fallen (brief flash between rounds) -->
      <div class="panel" id="fallen-panel">
        <h2>The castle has fallen.</h2>
      </div>

      <!-- Bridge -->
      <div class="panel" id="bridge-panel">
        <div id="bridge-line1">No human defense could save this castle.</div>
        <div id="bridge-line2">But there is a city that will never fall.</div>
        <button class="btn" id="bridge-btn">Defend Jerusalem</button>
      </div>

      <!-- Verse display -->
      <div id="verse-panel" style="display:none;">
        <div id="verse-text"></div>
        <div id="verse-ref"></div>
        <div id="main-truth">Jesus will defeat His enemies and reign as King forever without rival.</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── STATE ──
  var health = 100;
  var currentWave = 0;
  var wavesSurvived = 0;

  // damage: 0 = hold out (no health loss), >0 = health drops by that amount
  // Best picks (least damage):
  //   [0] Raise the Shields (0), [1] Brace the Gate with Timber (0), [2] Launch Fire at the Towers (0),
  //   [3] Ration What's Left Carefully (0), [4] Pour Water into the Tunnels (0),
  //   [5] Raid and Destroy Their Catapults (0), [6] Build Barricades and Dig Trenches (10),
  //   [7] Post Archers on the Highest Towers (15), [8] Flood the Tunnels with Water (20),
  //   [9] all 100 (auto-kill)
  // Best case: 0+0+0+0+0+0+10+15+20 = 45 damage → reach wave 10 at 55 HP
  var waves = [
    {
      title: "Archers Attack",
      subtitle: "A line of enemy archers fires on your walls",
      choices: ["Raise the Shields", "Fire Arrows Back", "Hide Inside the Buildings"],
      damage: [0, 10, 5],
      results: [
        "The shields deflect the arrows! The walls hold.",
        "Your archers trade volleys\u2026 but you lose more than they do.",
        "You\u2019re safe for now, but you\u2019ve given up the wall positions."
      ],
      defenseAnim: "defense-walls"
    },
    {
      title: "Battering Ram at the Gate",
      subtitle: "A massive ram pounds against the main gate",
      choices: ["Brace the Gate with Timber", "Drop Rocks on the Ram Crew", "Send Soldiers Out to Fight"],
      damage: [0, 5, 10],
      results: [
        "The timber braces hold! The gate stands firm.",
        "Some rocks land, but the ram is heavily armored.",
        "Your soldiers are exposed outside the walls and driven back."
      ],
      defenseAnim: "defense-supplies"
    },
    {
      title: "Siege Towers Rolling In",
      subtitle: "Wooden siege towers approach the walls",
      choices: ["Launch Fire at the Towers", "Rally Troops at the Walls", "Dig a Trench"],
      damage: [0, 5, 10],
      results: [
        "Direct hit! The wooden towers burn to the ground.",
        "Your troops hold the wall, but the towers keep coming.",
        "The trench slows them, but they fill it with rubble and press on."
      ],
      defenseAnim: "defense-unity"
    },
    {
      title: "Food and Water Running Out",
      subtitle: "The siege drags on and supplies are low",
      choices: ["Ration What\u2019s Left Carefully", "Send Scouts to Find Supplies", "Try to Break Through the Siege Lines"],
      damage: [0, 10, 10],
      results: [
        "Careful rationing keeps the garrison fed. Morale holds.",
        "The scouts are captured. No supplies get through.",
        "The breakout fails. Most are captured or driven back."
      ],
      defenseAnim: "defense-supplies"
    },
    {
      title: "Enemies Digging Under the Walls",
      subtitle: "You hear tunneling beneath the foundations",
      choices: ["Pour Water into the Tunnels", "Dig Tunnels to Meet Them", "Send Soldiers Outside to Stop Them"],
      damage: [0, 10, 15],
      results: [
        "Water floods the tunnels! The diggers retreat.",
        "Your diggers meet theirs underground\u2026 heavy losses on both sides.",
        "Your soldiers are ambushed outside the walls."
      ],
      defenseAnim: "defense-walls"
    },
    {
      title: "Flaming Rocks Rain Down",
      subtitle: "Fire catapults bombard the city",
      choices: ["Raid and Destroy Their Catapults", "Organize Teams to Fight Fires", "Retreat to the Inner Keep"],
      damage: [0, 10, 15],
      results: [
        "A daring raid destroys their catapults! The fires stop.",
        "Teams slow the damage, but buildings still burn.",
        "The outer city burns. You lose ground and supplies."
      ],
      defenseAnim: "defense-combat"
    },
    {
      title: "Horsemen Charge the Walls",
      subtitle: "Mounted warriors thunder toward you",
      choices: ["Build Barricades and Dig Trenches", "Line Up Spearmen at the Walls", "Open the Gates and Charge Out"],
      damage: [10, 15, 20],
      results: [
        "The barricades slow the charge\u2026 but they find a way around.",
        "The spearmen hold for a time, but there aren\u2019t enough.",
        "A brave charge\u2026 but you are outnumbered five to one."
      ],
      defenseAnim: "defense-walls"
    },
    {
      title: "Attack in the Dark",
      subtitle: "Under cover of night, soldiers scale the walls",
      choices: ["Post Archers on the Highest Towers", "Light Fires Along the Walls", "Send Patrols Along the Wall"],
      damage: [15, 20, 25],
      results: [
        "Your archers pick off many climbers\u2026 but some still slip through.",
        "The fires reveal some, but others breach the wall unseen.",
        "The patrols are spread too thin. Several breaches open."
      ],
      defenseAnim: "defense-unity"
    },
    {
      title: "The Ground Shakes",
      subtitle: "They\u2019re tunneling under the city itself",
      choices: ["Flood the Tunnels with Water", "Collapse Buildings to Block Them", "Abandon the Outer District"],
      damage: [20, 25, 30],
      results: [
        "Water slows the diggers, but the foundations are already cracked.",
        "Buildings fall and slow them\u2026 but new tunnels open elsewhere.",
        "You lose a third of the city. The enemy pours in."
      ],
      defenseAnim: "defense-combat"
    },
    {
      title: "The Final Assault",
      subtitle: "Every remaining enemy force attacks at once",
      choices: ["Man Every Wall", "Guard the Gate", "Charge Out to Fight"],
      damage: [100, 100, 100],
      results: [
        "You spread too thin. They break through everywhere.",
        "The gate holds, but they pour over the undefended walls.",
        "A brave charge\u2026 but there are too many. The city falls."
      ],
      defenseAnim: "defense-combat"
    }
  ];

  // ── INIT ──
  function generateStars() {
    var container = document.getElementById('stars');
    for (var i = 0; i < 50; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 45 + '%';
      var size = Math.random() * 2.5 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
  }

  function generateMerlons() {
    var wall = document.getElementById('wall');
    for (var i = 0; i < 27; i++) {
      var m = document.createElement('div');
      m.className = 'merlon';
      m.style.left = (i * 27 + 3) + 'px';
      wall.appendChild(m);
    }
  }

  generateStars();
  generateMerlons();

  // ── SCALE CITY TO FIT CONTAINER ──
  function scaleCity() {
    var game = document.getElementById('game');
    var gameW = game.offsetWidth;
    var gameH = game.offsetHeight;
    // City is 720px wide (wall). Target: fill ~85% of game width
    var scaleX = (gameW * 0.85) / 720;
    // City tallest building is ~240px + 80px wall = 320px. Target: fill ~55% of game height
    var scaleY = (gameH * 0.55) / 320;
    var scale = Math.min(scaleX, scaleY);
    document.getElementById('city-container').style.setProperty('--city-scale', scale);
  }
  scaleCity();
  window.addEventListener('resize', scaleCity);

  // ── EVENT LISTENERS ──
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('bridge-btn').addEventListener('click', startPhase2);
  document.getElementById('fullscreen-btn').addEventListener('click', function() {
    var game = document.getElementById('game');
    if (game.requestFullscreen) {
      game.requestFullscreen();
    } else if (game.webkitRequestFullscreen) {
      game.webkitRequestFullscreen();
    }
  });

  // ── HELPERS ──
  function showPanel(id) {
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    if (id) document.getElementById(id).classList.add('active');
  }

  function destroyCity() {
    document.querySelectorAll('.building').forEach(function(b) { b.classList.add('fallen'); });
    document.querySelectorAll('.tower').forEach(function(t) { t.classList.add('fallen'); });
    document.getElementById('wall').classList.add('fallen');
    document.getElementById('city-container').classList.add('destroyed');
  }

  function resetCity() {
    document.querySelectorAll('.building').forEach(function(b) { b.classList.remove('fallen', 'restored', 'damaged'); });
    document.querySelectorAll('.tower').forEach(function(t) { t.classList.remove('fallen', 'restored'); });
    var wall = document.getElementById('wall');
    wall.classList.remove('fallen', 'restored');
    document.getElementById('city-container').classList.remove('destroyed', 'restored');
    health = 100;
    var bar = document.getElementById('health-bar');
    bar.style.width = '100%';
    bar.classList.remove('low');
  }

  // Progressive damage — some buildings crumble based on health
  function updateCityDamage() {
    var buildings = document.querySelectorAll('.building');
    var total = buildings.length;
    // How many buildings should be damaged/fallen based on health
    var damagedCount = Math.floor((1 - health / 100) * total);
    // Damage from the outside buildings inward
    var damageOrder = [0, total - 1, 1, total - 2, 2, total - 3, 3, total - 4];
    for (var i = 0; i < total; i++) {
      var idx = i < damageOrder.length ? damageOrder[i] : i;
      if (idx >= 0 && idx < total) {
        if (i < damagedCount) {
          buildings[idx].classList.add('damaged');
        }
      }
    }
    // Full destruction at 0
    if (health <= 0) {
      destroyCity();
    }
  }

  function restoreCity() {
    document.querySelectorAll('.building').forEach(function(b) {
      b.classList.remove('fallen');
      b.classList.add('restored');
    });
    document.querySelectorAll('.tower').forEach(function(t) {
      t.classList.remove('fallen');
      t.classList.add('restored');
    });
    var wall = document.getElementById('wall');
    wall.classList.remove('fallen');
    wall.classList.add('restored');
    var city = document.getElementById('city-container');
    city.classList.remove('destroyed');
    city.classList.add('restored');
  }

  function updateHealth() {
    var bar = document.getElementById('health-bar');
    bar.style.width = health + '%';
    if (health <= 25) bar.classList.add('low');
  }

  // ── ATTACK EFFECTS ──
  function spawnArrows(dissolve) {
    var scene = document.getElementById('scene');
    for (var i = 0; i < 10; i++) {
      (function(idx) {
        setTimeout(function() {
          var arrow = document.createElement('div');
          arrow.className = 'arrow';
          var fromLeft = Math.random() > 0.5;
          arrow.style.top = (25 + Math.random() * 30) + '%';

          if (fromLeft) {
            arrow.style.left = '-50px';
            arrow.style.transform = 'rotate(-12deg)';
          } else {
            arrow.style.right = '-50px';
            arrow.style.transform = 'rotate(192deg)';
          }
          scene.appendChild(arrow);

          var duration = 500 + Math.random() * 300;
          if (dissolve) {
            arrow.animate([
              { opacity: 1 },
              { opacity: 0.8, offset: 0.6 },
              { opacity: 0 }
            ], { duration: duration, easing: 'ease-in' });
          }
          setTimeout(function() { arrow.remove(); }, duration + 100);
        }, idx * 80);
      })(i);
    }
  }

  function spawnFires() {
    var scene = document.getElementById('scene');
    for (var i = 0; i < 4; i++) {
      (function(idx) {
        setTimeout(function() {
          var fire = document.createElement('div');
          fire.className = 'fire';
          var hue = 15 + Math.random() * 25;
          var hue2 = 30 + Math.random() * 20;
          fire.style.background = 'radial-gradient(ellipse at bottom, hsl(' + hue + ', 100%, 50%) 0%, hsl(' + hue2 + ', 100%, 40%) 40%, transparent 70%)';
          fire.style.left = (35 + Math.random() * 30) + '%';
          fire.style.top = (40 + Math.random() * 15) + '%';
          scene.appendChild(fire);

          setTimeout(function() {
            fire.style.opacity = '0';
            fire.style.transition = 'opacity 1s';
            setTimeout(function() { fire.remove(); }, 1000);
          }, 2000);

          var smoke = document.createElement('div');
          smoke.className = 'smoke';
          smoke.style.left = fire.style.left;
          smoke.style.top = fire.style.top;
          scene.appendChild(smoke);
          setTimeout(function() { smoke.remove(); }, 3000);
        }, idx * 250);
      })(i);
    }
  }

  // ── GAME FLOW ──
  function startGame() {
    showPanel(null);
    document.getElementById('wave-counter').textContent = 'Wave 1 / 10';
    setTimeout(function() { showWave(0); }, 400);
  }

  function showWave(index) {
    currentWave = index;
    var wave = waves[index];
    document.getElementById('wave-title').textContent = wave.title;
    document.getElementById('wave-subtitle').textContent = wave.subtitle;

    // Apply wave color theme (cycle through 4 themes)
    var attackPanel = document.getElementById('attack-panel');
    attackPanel.className = 'panel wave-theme-' + (index % 4);

    var choicesDiv = document.getElementById('choices');
    while (choicesDiv.firstChild) { choicesDiv.removeChild(choicesDiv.firstChild); }

    wave.choices.forEach(function(choice, i) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.addEventListener('click', function() { selectDefense(i); });
      choicesDiv.appendChild(btn);
    });

    showPanel('attack-panel');
  }

  function selectDefense(choiceIndex) {
    var wave = waves[currentWave];
    var damage = wave.damage[choiceIndex];
    var buttons = document.querySelectorAll('.choice-btn');
    var isGoodChoice = damage === 0;

    // Disable + highlight
    buttons.forEach(function(b) { b.style.pointerEvents = 'none'; b.style.opacity = '0.4'; });
    buttons[choiceIndex].style.opacity = '1';
    buttons[choiceIndex].style.borderColor = isGoodChoice ? '#2ecc71' : '#c0392b';

    // Defense animation
    setTimeout(function() {
      showPanel(null);
      var city = document.getElementById('city-container');
      city.classList.add(wave.defenseAnim);

      // After defense anim: attack
      setTimeout(function() {
        city.classList.remove(wave.defenseAnim);
        playAttack(wave, choiceIndex);
      }, 1200);
    }, 600);
  }

  function playAttack(wave, choiceIndex) {
    var damage = wave.damage[choiceIndex];
    var isGoodChoice = damage === 0;

    // Shake (stronger for bad choices)
    var scene = document.getElementById('scene');
    if (!isGoodChoice) {
      scene.classList.add('shaking');
      setTimeout(function() { scene.classList.remove('shaking'); }, 600);
    }

    // Arrows (always), fire (later waves or bad choices)
    spawnArrows(isGoodChoice);
    if (currentWave >= 2 || damage >= 15) spawnFires();

    // Apply damage
    setTimeout(function() {
      health = Math.max(0, health - damage);
      updateHealth();
      updateCityDamage();
    }, 500);

    // Result text
    setTimeout(function() {
      var rt = document.getElementById('result-text');
      rt.textContent = wave.results[choiceIndex];
      if (isGoodChoice) {
        rt.style.color = '#2ecc71';
        rt.style.textShadow = '0 0 20px rgba(46, 204, 113, 0.4)';
      } else {
        rt.style.color = '#c0392b';
        rt.style.textShadow = '0 0 20px rgba(192, 57, 43, 0.4)';
      }
      rt.classList.add('visible');
    }, 1200);

    // Update wave counter + next
    setTimeout(function() {
      document.getElementById('result-text').classList.remove('visible');

      if (health <= 0) {
        // City fallen — go to bridge
        showPanel(null);
        setTimeout(function() {
          document.getElementById('dark-overlay').classList.add('active');
          var counter = document.getElementById('wave-counter');
          counter.textContent = 'Waves Survived: ' + wavesSurvived;
          setTimeout(function() { showPanel('bridge-panel'); }, 1500);
        }, 500);
      } else {
        // Survived — next wave
        wavesSurvived++;
        document.getElementById('wave-counter').textContent = 'Wave ' + (currentWave + 2) + ' / 10';
        setTimeout(function() { showWave(currentWave + 1); }, 1000);
      }
    }, 3500);
  }

  // ── PHASE 2 ──
  function startPhase2() {
    // Change label
    document.getElementById('health-label').textContent = 'Jerusalem';
    document.getElementById('wave-counter').textContent = '';

    // Reset city + health
    resetCity();
    restoreCity();

    // Lift overlay
    document.getElementById('dark-overlay').style.transition = 'opacity 2s ease';
    document.getElementById('dark-overlay').classList.remove('active');
    document.getElementById('dark-overlay').classList.add('clearing');

    // Show Phase 2 wave panel (mirrors Phase 1)
    document.getElementById('wave-title').textContent = 'All Nations Attack Jerusalem';
    document.getElementById('wave-subtitle').textContent = '\u201CAll the nations of the earth are gathered against her.\u201D \u2014 Zechariah 12:3';

    var choicesDiv = document.getElementById('choices');
    while (choicesDiv.firstChild) { choicesDiv.removeChild(choicesDiv.firstChild); }

    var trustBtn = document.createElement('button');
    trustBtn.className = 'choice-btn';
    trustBtn.textContent = 'Trust in God\u2019s Promises';
    trustBtn.style.minWidth = '220px';
    trustBtn.style.borderColor = '#8a7a50';
    trustBtn.style.color = '#d4a860';
    trustBtn.addEventListener('click', function() { onTrustClicked(); });
    choicesDiv.appendChild(trustBtn);

    showPanel('attack-panel');
  }

  function onTrustClicked() {
    // Disable button
    var buttons = document.querySelectorAll('.choice-btn');
    buttons.forEach(function(b) { b.style.pointerEvents = 'none'; b.style.opacity = '0.6'; });

    setTimeout(function() {
      showPanel(null);
      var city = document.getElementById('city-container');

      // Aura appears
      city.classList.add('aura-1');

      // Attack plays — but city holds
      setTimeout(function() {
        var scene = document.getElementById('scene');
        scene.classList.add('shaking');
        setTimeout(function() { scene.classList.remove('shaking'); }, 600);

        spawnArrows(true); // dissolve = true

        // Aura flash — arrows bounce off
        setTimeout(function() {
          city.classList.add('aura-flash');
          setTimeout(function() { city.classList.remove('aura-flash'); }, 800);
        }, 400);

        // Begin verse sequence
        setTimeout(function() { playVerseSequence(); }, 2000);
      }, 800);
    }, 600);
  }

  function playVerseSequence() {
    var versePanel = document.getElementById('verse-panel');
    var verseText = document.getElementById('verse-text');
    var verseRef = document.getElementById('verse-ref');
    var city = document.getElementById('city-container');
    versePanel.style.display = 'block';

    var verses = [
      {
        text: '\u201CI will make Jerusalem an immovable rock for all the nations.\u201D',
        ref: 'Zechariah 12:3',
        action: function() {
          // Aura already at 1
        }
      },
      {
        text: '\u201CA fountain will be opened to cleanse them from sin and impurity.\u201D',
        ref: 'Zechariah 13:1',
        action: function() {
          document.getElementById('water').classList.add('flowing');
          city.classList.remove('aura-1');
          city.classList.add('aura-2');
        }
      },
      {
        text: '\u201CThe LORD will be king over the whole earth.\u201D',
        ref: 'Zechariah 14:9',
        action: function() {
          document.getElementById('sky').classList.add('dawn');
          city.classList.remove('aura-2');
          city.classList.add('aura-3');
          // Restore health bar as gold
          var bar = document.getElementById('health-bar');
          bar.classList.remove('low');
          bar.classList.add('gold');
          health = 100;
          bar.style.width = '100%';
          document.getElementById('health-label').textContent = 'Jerusalem Restored';
        }
      }
    ];

    var delay = 500;
    verses.forEach(function(v, i) {
      // Show verse
      setTimeout(function() {
        verseText.classList.remove('visible');
        verseRef.classList.remove('visible');

        setTimeout(function() {
          verseText.textContent = v.text;
          verseRef.textContent = v.ref;
          verseText.classList.add('visible');
          verseRef.classList.add('visible');
          v.action();
        }, 400);
      }, delay);

      delay += 6500;
    });

    // Main truth
    setTimeout(function() {
      verseText.classList.remove('visible');
      verseRef.classList.remove('visible');

      setTimeout(function() {
        verseText.style.display = 'none';
        verseRef.style.display = 'none';
        document.getElementById('main-truth').classList.add('visible');
      }, 600);
    }, delay);
  }
</script>

</body>
</html>
